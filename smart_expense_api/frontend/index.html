<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* --- CSS CƠ BẢN & NỀN --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: url('https://images.unsplash.com/photo-1486312338219-ce68d2c6f44d?auto=format&fit=crop&w=1952&q=80') no-repeat center center fixed;
            background-size: cover; height: 100vh; display: flex; justify-content: center; align-items: center; color: white;
        }
        body::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: -1; }
        
        /* Scrollbar đẹp */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #03e9f4; }

        /* Login/Register Box */
        .auth-box {
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; width: 350px; text-align: center; border: 1px solid rgba(255,255,255,0.1);
        }
        .input-box { position: relative; margin-bottom: 30px; text-align: left;}
        .input-box input { width: 100%; padding: 10px 0; background: transparent; border: none; border-bottom: 1px solid #fff; color: white; outline: none; }
        .input-box label { position: absolute; top: 0; left: 0; pointer-events: none; transition: .5s; color: #fff; }
        .input-box input:focus ~ label, .input-box input:valid ~ label { top: -20px; font-size: 12px; color: #03e9f4; }
        button.btn-neon { background: transparent; border: 2px solid #03e9f4; color: #03e9f4; padding: 10px 20px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button.btn-neon:hover { background: #03e9f4; color: black; box-shadow: 0 0 15px #03e9f4; }

        /* Dashboard Structure */
        #dashboard-section {
            display: none; width: 95%; max-width: 1200px; height: 85vh;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden; display: flex;
        }
        .sidebar { width: 250px; background: rgba(0,0,0,0.6); padding: 30px 20px; display: flex; flex-direction: column; }
        .user-info { text-align: center; margin-bottom: 50px; }
        .avatar { font-size: 50px; color: #03e9f4; margin-bottom: 10px; }
        .menu-item { color: #ccc; padding: 15px; margin-bottom: 10px; display: block; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .menu-item:hover, .menu-item.active { background: rgba(255,255,255,0.1); color: #fff; border-left: 4px solid #03e9f4; }
        .menu-item i { margin-right: 15px; width: 20px; text-align: center;}

        .main-content { flex: 1; padding: 30px; overflow-y: auto; position: relative; }

        /* Home View Components */
        .stats-row { display: flex; gap: 20px; margin-bottom: 30px; }
        .card { flex: 1; background: rgba(0,0,0,0.6); padding: 25px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; }
        .card h4 { font-size: 14px; color: #aaa; margin-bottom: 5px; text-transform: uppercase; }
        .card .value { font-size: 24px; font-weight: bold; }
        .icon-bg { font-size: 40px; opacity: 0.2; }
        .text-green { color: #00ff88; } .text-red { color: #ff3333; } .text-blue { color: #00ccff; }

        .list-container { background: rgba(0,0,0,0.5); border-radius: 15px; padding: 25px; min-height: 400px; }
        .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-add-new { background: #03e9f4; color: black; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        /* Transaction List Styling */
        .transaction-item { 
            display: flex; align-items: center; padding: 15px; 
            border-bottom: 1px solid rgba(255,255,255,0.1); transition: 0.2s;
        }
        .transaction-item:hover { background: rgba(255,255,255,0.05); }
        .t-icon-box {
            width: 50px; height: 50px; border-radius: 50%; 
            background: rgba(3, 233, 244, 0.15); color: #03e9f4; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 20px; margin-right: 15px; flex-shrink: 0;
        }
        .t-content { flex: 1; }
        .t-title { font-size: 16px; font-weight: bold; color: white; margin-bottom: 5px; text-transform: capitalize; }
        .t-date { font-size: 13px; color: #aaa; }
        .t-amount { font-weight: bold; font-size: 18px; }

        /* --- CSS MỚI CHO PHẦN THỐNG KÊ (STATS VIEW) --- */
        #view-stats { display: none; height: 100%; flex-direction: column; }
        
        .charts-grid {
            display: flex; flex-wrap: wrap; gap: 20px; padding-bottom: 20px;
        }

        .chart-box {
            background: rgba(0,0,0,0.5); border-radius: 15px; padding: 20px;
            flex: 1; min-width: 350px;
            display: flex; flex-direction: column;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Box riêng cho Ngân sách danh mục sẽ full width nếu xuống dòng */
        .full-width-box { flex-basis: 100%; }

        .chart-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        .chart-header h3 { font-size: 16px; color: #03e9f4; }

        /* Budget Control (Input Hạn mức tổng) */
        .budget-control { display: flex; gap: 5px; align-items: center; }
        .budget-input {
            background: #333; border: 1px solid #555; color: white;
            padding: 5px 10px; border-radius: 5px; width: 120px; text-align: right; font-weight: bold;
        }
        .btn-save-budget {
            background: #00ff88; color: black; border: none;
            border-radius: 5px; cursor: pointer; padding: 6px 10px;
        }
        .btn-save-budget:hover { opacity: 0.8; }

        .canvas-wrapper { flex: 1; position: relative; min-height: 250px; }

        /* ===> CSS MỚI: THANH NGÂN SÁCH (PROGRESS BARS) <=== */
        .budget-item { margin-bottom: 15px; padding: 10px; background: rgba(255,255,255,0.02); border-radius: 8px; }
        .budget-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        
        .b-cat-name { cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 500; }
        .b-cat-name:hover { color: #03e9f4; }
        .b-cat-icon { width: 20px; text-align: center; color: #aaa; }
        
        .b-amount-text { font-size: 13px; color: #ccc; }
        .b-amount-text span { color: white; font-weight: bold; }

        .progress-track { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
        
        /* Màu sắc trạng thái */
        .safe { background: #00ff88; box-shadow: 0 0 5px #00ff88; }
        .warning { background: #ffce56; }
        .danger { background: #ff3333; box-shadow: 0 0 5px #ff3333; }

        /* Modal */
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; display: none; justify-content: center; align-items: center; }
        .modal-content { background: #222; width: 400px; padding: 30px; border-radius: 15px; border: 1px solid #444; }
        .form-group { margin-bottom: 15px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #333; border: 1px solid #555; color: white; border-radius: 5px; }
        .modal-actions { text-align: right; margin-top: 20px; }
        .btn-cancel { background: #555; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-right: 10px; }
        .btn-save { background: #03e9f4; color: black; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="auth-container">
        <div id="login-form-box" class="auth-box">
            <div style="font-size: 50px; color: #03e9f4; margin-bottom: 20px;"><i class="fas fa-user-astronaut"></i></div>
            <h2>Xin chào!</h2>
            <form id="login-form">
                <div class="input-box"><input type="text" id="login-user" required><label>Tên đăng nhập</label></div>
                <div class="input-box"><input type="password" id="login-pass" required><label>Mật khẩu</label></div>
                <button type="submit" class="btn-neon">ĐĂNG NHẬP</button>
            </form>
            <p style="margin-top: 20px; font-size: 13px; color: #aaa; cursor: pointer;" id="to-register">Chưa có tài khoản? Đăng ký</p>
            <p id="msg-error" style="color: #ff3333; margin-top: 10px;"></p>
        </div>
        <div id="register-form-box" class="auth-box" style="display: none;">
            <h2>Đăng Ký</h2>
            <form id="register-form">
                <div class="input-box"><input type="text" id="reg-user" required><label>Username</label></div>
                <div class="input-box"><input type="email" id="reg-email" required><label>Email</label></div>
                <div class="input-box"><input type="password" id="reg-pass" required><label>Password</label></div>
                <button type="submit" class="btn-neon">ĐĂNG KÝ</button>
            </form>
            <p style="margin-top: 20px; font-size: 13px; color: #aaa; cursor: pointer;" id="to-login">Quay lại đăng nhập</p>
        </div>
    </div>

    <div id="dashboard-section" style="display: none;">
        <div class="sidebar">
            <div class="user-info">
                <div class="avatar"><i class="fas fa-user-astronaut"></i></div>
                <h3 id="display-name">User</h3>
            </div>
            <a class="menu-item active" id="tab-home"><i class="fas fa-home"></i> Trang chủ</a>
            <a class="menu-item" id="menu-btn-add"><i class="fas fa-plus-circle"></i> Nhập vào</a>
            <a class="menu-item" id="tab-stats"><i class="fas fa-chart-pie"></i> Thống kê</a>
            <a class="menu-item" id="btn-logout" style="margin-top: auto;"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
        </div>

        <div class="main-content">
            
            <div id="view-home">
                <div class="stats-row">
                    <div class="card"><div><h4>Tổng Thu</h4><div class="value text-green" id="total-income-display">0 đ</div></div><div class="icon-bg"><i class="fas fa-arrow-up"></i></div></div>
                    <div class="card"><div><h4>Tổng Chi</h4><div class="value text-red" id="total-expense-display">0 đ</div></div><div class="icon-bg"><i class="fas fa-credit-card"></i></div></div>
                    <div class="card"><div><h4>Còn Lại</h4><div class="value text-blue" id="total-balance-display">0 đ</div></div><div class="icon-bg"><i class="fas fa-wallet"></i></div></div>
                </div>
                <div class="list-container">
                    <div class="list-header">
                        <h3><i class="fas fa-history"></i> Giao dịch gần đây</h3>
                        <button class="btn-add-new" id="btn-open-modal">+ Thêm mới</button>
                    </div>
                    <div id="transaction-list"></div>
                </div>
            </div>

            <div id="view-stats">
                <div class="charts-grid">
                    
                    <div class="chart-box">
                        <div class="chart-header">
                            <h3><i class="fas fa-chart-pie"></i> Phân bổ chi tiêu</h3>
                        </div>
                        <div class="canvas-wrapper">
                            <canvas id="myChart"></canvas>
                        </div>
                    </div>

                    <div class="chart-box">
                        <div class="chart-header">
                            <h3><i class="fas fa-chart-bar"></i> Theo dõi Hạn mức Tổng</h3>
                            <div class="budget-control">
                                <input type="number" id="inp-budget" class="budget-input" value="5000000">
                                <button id="btn-save-budget" class="btn-save-budget" title="Lưu hạn mức"><i class="fas fa-save"></i></button>
                            </div>
                        </div>
                        <div class="canvas-wrapper">
                            <canvas id="historyChart"></canvas>
                        </div>
                    </div>

                    <div class="chart-box full-width-box">
                        <div class="chart-header">
                            <h3><i class="fas fa-wallet"></i> Ngân sách chi tiết</h3>
                            <span style="font-size:12px; color:#aaa; font-style: italic;">*Bấm vào tên danh mục để đặt hạn mức</span>
                        </div>
                        <div id="category-budget-list" style="max-height: 350px; overflow-y: auto; padding-right: 5px;">
                            </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal-content">
            <h3 style="color: #03e9f4; margin-bottom: 20px;">Thêm Giao Dịch</h3>
            <form id="add-expense-form">
                <div class="form-group"><label>Số tiền</label><input type="number" id="inp-amount" placeholder="VD: 50000" required></div>
                <div class="form-group"><label>Nội dung</label><input type="text" id="inp-desc" placeholder="VD: Ăn trưa" required></div>
                <div class="form-group"><label>Danh mục</label><select id="inp-category"></select></div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" id="btn-close-modal">Hủy</button>
                    <button type="submit" class="btn-save">Lưu</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="script.js?v=999"></script>
</body>
</html>
