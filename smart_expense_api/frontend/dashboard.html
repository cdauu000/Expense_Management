<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Quản Lý Chi Tiêu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background"></div>

    <div class="dashboard-container">
        <div class="sidebar glass">
            <div class="profile">
                <i class="fa-solid fa-user-astronaut"></i>
                <h3>Xin chào!</h3>
            </div>
            <ul class="menu">
                <li class="active"><a href="#"><i class="fa-solid fa-house"></i> Trang chủ</a></li>
                <li><a href="#" onclick="openModal()"><i class="fa-solid fa-plus-circle"></i> Nhập vào</a></li>
                <li><a href="#"><i class="fa-solid fa-chart-pie"></i> Thống kê</a></li>
                <li><a href="#" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Đăng xuất</a></li>
            </ul>
        </div>

        <div class="main-content">
            
            <div class="cards-container">
                <div class="card glass income">
                    <div class="card-info">
                        <h3>TỔNG THU</h3>
                        <p id="total-income">0 đ</p>
                    </div>
                    <i class="fa-solid fa-sack-dollar icon"></i>
                </div>

                <div class="card glass expense">
                    <div class="card-info">
                        <h3>TỔNG CHI</h3>
                        <p id="total-expense">0 đ</p>
                    </div>
                    <i class="fa-solid fa-credit-card icon"></i>
                </div>

                <div class="card glass balance">
                    <div class="card-info">
                        <h3>CÒN LẠI</h3>
                        <p id="total-balance">0 đ</p>
                    </div>
                    <i class="fa-solid fa-wallet icon"></i>
                </div>
            </div>

            <div class="transactions-section glass">
                <div class="section-header">
                    <h2><i class="fa-solid fa-clock-rotate-left"></i> Nhìn lại (Giao dịch gần đây)</h2>
                    <button class="btn-add" onclick="openModal()">+ Thêm mới</button>
                </div>
                
                <div class="transaction-list" id="transaction-list">
                    <div class="transaction-item">
                        <div class="t-info">
                            <span class="t-cat">Ăn uống</span>
                            <span class="t-date">Hôm nay</span>
                        </div>
                        <div class="t-amount expense">-50.000 đ</div>
                        <button class="btn-del"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="addModal" class="modal">
        <div class="modal-content glass">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Thêm giao dịch mới</h2>
            <form id="add-form">
                <div class="input-group">
                    <label>Loại:</label>
                    <select id="t-type">
                        <option value="expense">Khoản Chi (Tiêu tiền)</option>
                        <option value="income">Khoản Thu (Nhận tiền)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Số tiền:</label>
                    <input type="number" id="t-amount" placeholder="Ví dụ: 50000" required>
                </div>
                <div class="input-group">
                    <label>Danh mục:</label>
                    <input type="text" id="t-category" placeholder="Ví dụ: Ăn sáng, Lương..." required>
                </div>
                <button type="submit" class="btn-submit">Lưu lại</button>
            </form>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
